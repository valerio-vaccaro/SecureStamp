{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h1>Symbols Dashboard</h1>
    
    <div class="row mb-4">
        <div class="col text-end">
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createSymbolModal">
                Create New Symbol
            </button>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Created At</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="symbolsTableBody">
                {% for symbol in symbols %}
                <tr>
                    <td>{{ symbol.id }}</td>
                    <td>{{ symbol.name }}</td>
                    <td>{{ symbol.description }}</td>
                    <td>{{ symbol.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
                    <td>
                        <button class="btn btn-sm btn-danger delete-symbol" data-id="{{ symbol.id }}">Delete</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<!-- Create Symbol Modal -->
<div class="modal fade" id="createSymbolModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Create New Symbol</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="symbolForm">
                    <div class="mb-3">
                        <label for="symbolName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="symbolName" required>
                    </div>
                    <div class="mb-3">
                        <label for="symbolDescription" class="form-label">Description</label>
                        <textarea class="form-control" id="symbolDescription" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="createSymbolBtn">Create</button>
            </div>
        </div>
    </div>
</div>

<script>
document.getElementById('createSymbolBtn').addEventListener('click', function() {
    const name = document.getElementById('symbolName').value;
    const description = document.getElementById('symbolDescription').value;

    if (!name) {
        alert('Name is required');
        return;
    }

    fetch('/api/symbols', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            name: name,
            description: description
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            // Add new row to table
            const tbody = document.getElementById('symbolsTableBody');
            const newRow = `
                <tr>
                    <td>${data.symbol.id}</td>
                    <td>${data.symbol.name}</td>
                    <td>${data.symbol.description}</td>
                    <td>${data.symbol.created_at}</td>
                    <td>
                        <button class="btn btn-sm btn-danger delete-symbol" data-id="${data.symbol.id}">Delete</button>
                    </td>
                </tr>
            `;
            tbody.insertAdjacentHTML('afterbegin', newRow);
            
            // Close modal and reset form
            const modal = bootstrap.Modal.getInstance(document.getElementById('createSymbolModal'));
            modal.hide();
            document.getElementById('symbolForm').reset();
        }
    })
    .catch(error => {
        console.error('Error:', error);
        alert('An error occurred while creating the symbol');
    });
});

// Delete symbol functionality
document.addEventListener('click', function(e) {
    if (e.target.classList.contains('delete-symbol')) {
        if (confirm('Are you sure you want to delete this symbol?')) {
            const symbolId = e.target.dataset.id;
            const row = e.target.closest('tr');
            
            fetch(`/api/symbols/${symbolId}`, {
                method: 'DELETE'
            })
            .then(response => {
                if (response.ok) {
                    row.remove();
                } else {
                    alert('Failed to delete symbol');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while deleting the symbol');
            });
        }
    }
});
</script>
{% endblock %}
